rules:
  - id: py.rce.eval-exec
    languages: [python]
    severity: ERROR
    message: "eval или exec: риск выполнения произвольного кода."
    metadata: {cwe: ["CWE-94"], confidence: HIGH}
    paths:
      exclude:
        - "setup.py"
        - "**/setup.py"
        - "setup.cfg"
        - "**/setup.cfg"
        - "pyproject.toml"
        - "**/pyproject.toml"
        - "**/tests/**"
        - "**/test/**"
        - "**/docs/**"
        - "**/examples/**"
    pattern-either:
      - pattern: eval(...)
      - pattern: exec(...)

  - id: py.injection.shell-true
    languages: [python]
    severity: ERROR
    message: "shell=True или os.system: риск command injection."
    metadata: {cwe: ["CWE-78"], confidence: HIGH}
    paths:
      exclude:
        - "setup.py"
        - "**/setup.py"
        - "setup.cfg"
        - "**/setup.cfg"
        - "pyproject.toml"
        - "**/pyproject.toml"
        - "**/tests/**"
        - "**/test/**"
        - "**/docs/**"
        - "**/examples/**"
    pattern-either:
      - pattern: subprocess.run(..., shell=True, ...)
      - pattern: subprocess.Popen(..., shell=True, ...)
      - pattern: subprocess.call(..., shell=True, ...)
      - pattern: subprocess.check_output(..., shell=True, ...)
      - pattern: os.system(...)

  - id: py.rce.pickle
    languages: [python]
    severity: ERROR
    message: "pickle.load или pickle.loads: риск RCE при недоверенных данных."
    metadata: {cwe: ["CWE-502"], confidence: HIGH}
    paths:
      exclude:
        - "setup.py"
        - "**/setup.py"
        - "setup.cfg"
        - "**/setup.cfg"
        - "pyproject.toml"
        - "**/pyproject.toml"
        - "**/tests/**"
        - "**/test/**"
        - "**/docs/**"
        - "**/examples/**"
    pattern-either:
      - pattern: pickle.load(...)
      - pattern: pickle.loads(...)

  - id: py.rce.yaml-load
    languages: [python]
    severity: ERROR
    message: "yaml.load без safe_load: риск RCE через небезопасный loader."
    metadata: {cwe: ["CWE-502"], confidence: HIGH}
    paths:
      exclude:
        - "setup.py"
        - "**/setup.py"
        - "setup.cfg"
        - "**/setup.cfg"
        - "pyproject.toml"
        - "**/pyproject.toml"
        - "**/tests/**"
        - "**/test/**"
        - "**/docs/**"
        - "**/examples/**"
    pattern-either:
      - pattern: yaml.load(...)
      - pattern: yaml.load(..., Loader=yaml.Loader, ...)
      - pattern: yaml.load(..., Loader=yaml.FullLoader, ...)

  - id: py.tls.requests-verify-false
    languages: [python]
    severity: WARNING
    message: "requests с verify=False отключает проверку TLS сертификатов."
    metadata: {cwe: ["CWE-295"], confidence: HIGH}
    paths:
      exclude:
        - "setup.py"
        - "**/setup.py"
        - "setup.cfg"
        - "**/setup.cfg"
        - "pyproject.toml"
        - "**/pyproject.toml"
        - "**/tests/**"
        - "**/test/**"
        - "**/docs/**"
        - "**/examples/**"
    pattern-either:
      - pattern: requests.get(..., verify=False, ...)
      - pattern: requests.post(..., verify=False, ...)
      - pattern: requests.put(..., verify=False, ...)
      - pattern: requests.delete(..., verify=False, ...)
      - pattern: requests.request(..., verify=False, ...)

  - id: py.tls.ssl-unverified-context
    languages: [python]
    severity: ERROR
    message: "ssl._create_unverified_context: отключена проверка сертификатов."
    metadata: {cwe: ["CWE-295"], confidence: HIGH}
    paths:
      exclude:
        - "setup.py"
        - "**/setup.py"
        - "setup.cfg"
        - "**/setup.cfg"
        - "pyproject.toml"
        - "**/pyproject.toml"
        - "**/tests/**"
        - "**/test/**"
        - "**/docs/**"
        - "**/examples/**"
    pattern: ssl._create_unverified_context(...)