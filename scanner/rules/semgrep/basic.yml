rules:
  - id: py.exec-eval
    languages: [python]
    severity: ERROR
    message: "Динамическое выполнение кода (eval/exec). Риск RCE."
    metadata:
      cwe: ["CWE-94"]
      owasp: ["A03:2021 - Injection"]
      category: security
      technology: [python]
      confidence: HIGH
    pattern-either:
      - pattern: eval(...)
      - pattern: exec(...)

  - id: py.subprocess-shell-true
    languages: [python]
    severity: ERROR
    message: "subprocess с shell=True. Риск command injection."
    metadata:
      cwe: ["CWE-78"]
      owasp: ["A03:2021 - Injection"]
      category: security
      technology: [python]
      confidence: HIGH
    pattern-either:
      - pattern: subprocess.Popen(..., shell=True, ...)
      - pattern: subprocess.call(..., shell=True, ...)
      - pattern: subprocess.run(..., shell=True, ...)
      - pattern: subprocess.check_output(..., shell=True, ...)
      - pattern: os.system(...)

  - id: py.pickle-load
    languages: [python]
    severity: ERROR
    message: "pickle.load или loads на недоверенных данных. Риск RCE."
    metadata:
      cwe: ["CWE-502"]
      owasp: ["A08:2021 - Software and Data Integrity Failures"]
      category: security
      technology: [python]
      confidence: HIGH
    pattern-either:
      - pattern: pickle.load(...)
      - pattern: pickle.loads(...)

  - id: py.yaml-unsafe-load
    languages: [python]
    severity: ERROR
    message: "yaml.load без SafeLoader. Риск RCE. Используй yaml.safe_load."
    metadata:
      cwe: ["CWE-502"]
      owasp: ["A08:2021 - Software and Data Integrity Failures"]
      category: security
      technology: [python]
      confidence: HIGH
    pattern-either:
      - pattern: yaml.load(...)
      - pattern: yaml.load(..., Loader=yaml.Loader, ...)
      - pattern: yaml.load(..., Loader=yaml.FullLoader, ...)

  - id: py.requests-verify-false
    languages: [python]
    severity: WARNING
    message: "requests с verify=False отключает проверку TLS сертификата. Риск MITM."
    metadata:
      cwe: ["CWE-295"]
      owasp: ["A02:2021 - Cryptographic Failures"]
      category: security
      technology: [python]
      confidence: HIGH
    pattern-either:
      - pattern: requests.get(..., verify=False, ...)
      - pattern: requests.post(..., verify=False, ...)
      - pattern: requests.put(..., verify=False, ...)
      - pattern: requests.delete(..., verify=False, ...)
      - pattern: requests.request(..., verify=False, ...)

  - id: py.urllib3-disable-warnings
    languages: [python]
    severity: WARNING
    message: "Отключение предупреждений TLS может скрывать проблемы безопасности."
    metadata:
      cwe: ["CWE-295"]
      owasp: ["A02:2021 - Cryptographic Failures"]
      category: security
      technology: [python]
      confidence: MEDIUM
    pattern: urllib3.disable_warnings(...)

  - id: py.hashlib-md5-sha1
    languages: [python]
    severity: WARNING
    message: "Использование MD5 или SHA1. Для безопасности лучше SHA-256 и выше."
    metadata:
      cwe: ["CWE-327"]
      owasp: ["A02:2021 - Cryptographic Failures"]
      category: security
      technology: [python]
      confidence: HIGH
    pattern-either:
      - pattern: hashlib.md5(...)
      - pattern: hashlib.sha1(...)

  - id: py.random-insecure
    languages: [python]
    severity: WARNING
    message: "random для токенов и секретов небезопасен. Используй secrets."
    metadata:
      cwe: ["CWE-338"]
      owasp: ["A02:2021 - Cryptographic Failures"]
      category: security
      technology: [python]
      confidence: MEDIUM
    pattern-either:
      - pattern: random.random()
      - pattern: random.randint(...)
      - pattern: random.choice(...)
      - pattern: random.choices(...)

  - id: py.tempfile-mkstemp
    languages: [python]
    severity: WARNING
    message: "mkstemp или NamedTemporaryFile без явных прав может приводить к рискам. Проверь права и каталог."
    metadata:
      cwe: ["CWE-377"]
      category: security
      technology: [python]
      confidence: LOW
    pattern-either:
      - pattern: tempfile.mkstemp(...)
      - pattern: tempfile.NamedTemporaryFile(...)

  - id: py.hardcoded-secret
    languages: [python]
    severity: ERROR
    message: "Возможный захардкоженный секрет (ключ, токен, пароль). Перенеси в переменные окружения или секрет-хранилище."
    metadata:
      cwe: ["CWE-798"]
      owasp: ["A07:2021 - Identification and Authentication Failures"]
      category: secrets
      technology: [python]
      confidence: MEDIUM
    pattern-regex: '(?i)(api[_-]?key|secret|token|passwd|password)\s*=\s*["''][^"'']{8,}["'']'

  - id: py.jwt-none-alg
    languages: [python]
    severity: ERROR
    message: "JWT с алгоритмом none. Риск обхода проверки подписи."
    metadata:
      cwe: ["CWE-347"]
      owasp: ["A07:2021 - Identification and Authentication Failures"]
      category: security
      technology: [python]
      confidence: MEDIUM
    pattern-regex: '(?i)(alg)\s*[:=]\s*["'']none["'']'